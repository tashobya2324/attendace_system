<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="Mbarara coat of arms">
  <defs>
    <clipPath id="shieldClip">
      <path d="M100,8 C66,8 34,16 20,24 L20,96 C20,150 52,192 100,222 C148,192 180,150 180,96 L180,24 C166,16 134,8 100,8 Z"/>
    </clipPath>
  </defs>

  <!-- shield outline -->
  <path d="M100,8 C66,8 34,16 20,24 L20,96 C20,150 52,192 100,222 C148,192 180,150 180,96 L180,24 C166,16 134,8 100,8 Z"
        fill="#16a7bd" stroke="#111318" stroke-width="6" stroke-linejoin="round"/>

  <g clip-path="url(#shieldClip)">
    <!-- ground/water band -->
    <rect x="10" y="150" width="180" height="80" fill="#0f6e7d"/>

    <!-- left banana/leaf plant -->
    <g fill="#111318">
      <path d="M34,150 C24,120 30,86 46,60 C42,92 44,120 52,150 Z"/>
      <path d="M46,150 C40,116 48,84 68,58 C58,90 56,120 62,150 Z"/>
      <ellipse cx="44" cy="70" rx="11" ry="16" transform="rotate(-18 44 70)"/>
    </g>
    <rect x="40" y="140" width="14" height="16" fill="#3c2a1a"/>

    <!-- right flowers on rock -->
    <path d="M150,150 C146,120 150,96 158,150 Z" fill="#8a8f95"/>
    <path d="M164,150 C160,120 164,96 172,150 Z" fill="#8a8f95"/>
    <g fill="#3a8a3f">
      <rect x="140" y="96" width="4" height="46"/>
      <rect x="150" y="86" width="4" height="56"/>
      <rect x="160" y="92" width="4" height="50"/>
    </g>
    <g fill="#f4c430" stroke="#b8860b" stroke-width="1">
      <circle cx="142" cy="92" r="7"/>
      <circle cx="152" cy="80" r="7"/>
      <circle cx="162" cy="88" r="7"/>
    </g>

    <!-- central emblem: footprints -->
    <ellipse cx="100" cy="108" rx="34" ry="26" fill="#f4f2e9" stroke="#111318" stroke-width="4"/>
    <g fill="#111318">
      <ellipse cx="90" cy="100" rx="8" ry="15" transform="rotate(-8 90 100)"/>
      <ellipse cx="111" cy="101" rx="8" ry="15" transform="rotate(8 111 101)"/>
    </g>

    <!-- roses bottom left/right -->
    <g>
      <circle cx="58" cy="176" r="10" fill="#c22a2a" stroke="#7a1414" stroke-width="1.5"/>
      <circle cx="70" cy="186" r="8" fill="#c22a2a" stroke="#7a1414" stroke-width="1.5"/>
      <path d="M50,190 q10,-6 18,0" stroke="#2e7d32" stroke-width="4" fill="none"/>
    </g>
    <g>
      <circle cx="142" cy="176" r="10" fill="#c22a2a" stroke="#7a1414" stroke-width="1.5"/>
      <circle cx="130" cy="186" r="8" fill="#c22a2a" stroke="#7a1414" stroke-width="1.5"/>
      <path d="M150,190 q-10,-6 -18,0" stroke="#2e7d32" stroke-width="4" fill="none"/>
    </g>

    <!-- Ankole longhorn cow head -->
    <g>
      <path d="M100,150 C70,140 46,150 40,178 C52,168 62,166 70,170 C64,158 66,142 84,130 Z" fill="#f4f2e9" stroke="#111318" stroke-width="3"/>
      <path d="M100,150 C130,140 154,150 160,178 C148,168 138,166 130,170 C136,158 134,142 116,130 Z" fill="#f4f2e9" stroke="#111318" stroke-width="3"/>
      <path d="M100,142 C82,142 70,158 70,176 C70,196 84,210 100,212 C116,210 130,196 130,176 C130,158 118,142 100,142 Z" fill="#f4f2e9" stroke="#111318" stroke-width="3.5"/>
      <ellipse cx="100" cy="196" rx="14" ry="10" fill="#111318"/>
      <circle cx="86" cy="172" r="4.5" fill="#111318"/>
      <circle cx="114" cy="172" r="4.5" fill="#111318"/>
    </g>
  </g>

  <!-- shield outline redraw on top for crisp edge -->
  <path d="M100,8 C66,8 34,16 20,24 L20,96 C20,150 52,192 100,222 C148,192 180,150 180,96 L180,24 C166,16 134,8 100,8 Z"
        fill="none" stroke="#111318" stroke-width="6" stroke-linejoin="round"/>

  <!-- ribbon banner -->
  <path d="M14,222 L100,214 L186,222 L172,236 L100,230 L28,236 Z" fill="#f0b90b" stroke="#111318" stroke-width="3" stroke-linejoin="round"/>
</svg>
